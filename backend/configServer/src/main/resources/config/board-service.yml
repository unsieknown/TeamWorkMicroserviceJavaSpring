spring:
  data:
    mongodb:
      database: ${MONGO_DB_NAME}
      username: ${MONGO_DB_USER}
      password: ${MONGO_DB_PASSWORD}
      port: ${MONGO_DB_PORT}
      host: ${MONGO_DB_HOST}
      authentication-database: ${MONGO_DB_NAME}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8086/.well-known/jwks.json

server:
  port: 8085
eureka:
  instance:
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${server.port}
    hostname: ${spring.application.name}
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka

interservice:
  services:
    current_service: "http://board-service"
    auth_service: "http://auth-serice"
    user_service: "http://user-service"
    team_service: "http://team-service"

rabbitmq:
  exchange:
    board: "board.exchange"
    user: "user.exchange"
  queue:
    userDelete: "user.delete"
  routing:
    received:
      user:
        delete: "user.delete"

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always