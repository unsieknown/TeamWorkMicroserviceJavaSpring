spring:
  application:
    name: config-server
  main:
    banner-mode: off
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config

server:
  port: 8888
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://eureka:8761/eureka

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always