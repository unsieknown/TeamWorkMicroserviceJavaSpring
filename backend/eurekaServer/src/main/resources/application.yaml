spring:
  application:
    name: eureka-server
  main:
    banner-mode: off

server:
  port: 8761
eureka:
  client:
    fetch-registry: false
    register-with-eureka: false
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true